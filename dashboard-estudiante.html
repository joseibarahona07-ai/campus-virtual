<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="img/logo.png">
<meta name="theme-color" content="#1a3c6e">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Campus Virtual - Estudiante</title>
  <link rel="stylesheet" href="css/estilos.css"/>
</head>
<body>
<div class="sidebar">
    <div class="sidebar-logo">
      <img src="img/logo.jpeg" alt="PANB"/>
    </div>
    <div class="sidebar-titulo">Portal Académico Nimia Baquedano</div>
    <div class="sidebar-slogan">Formando futuro y conocimiento</div>
    <hr class="sidebar-divisor"/>
    <div class="usuario-nombre" id="nombre-usuario">Cargando...</div>
    <div class="nav-item activo" onclick="mostrarSeccion('mis-clases')">📚 Mis Clases</div>
    <div class="nav-item" onclick="mostrarSeccion('tareas')">📝 Tareas</div>
    <div class="nav-item" onclick="mostrarSeccion('materiales')">📁 Materiales</div>
    <div class="nav-item" onclick="mostrarSeccion('calificaciones')">⭐ Calificaciones</div>
    <div class="cerrar-sesion" onclick="cerrarSesion()">🚪 Cerrar sesión</div>
</div>
  <div class="contenido-principal">

    <!-- Mis Clases -->
    <div id="seccion-mis-clases">
      <h2 style="margin-bottom:20px; color:#1a3c6e;">Mis Clases</h2>
      <div class="tarjeta">
        <h3>Inscribirse a una clase</h3>
        <div style="display:flex; gap:10px; align-items:center;">
          <input type="text" id="codigo-seccion" placeholder="Código de la clase (ej: MAT101)"
            style="padding:10px; border:1px solid #ddd; border-radius:8px; font-size:0.95rem; width:250px;"/>
          <button class="btn btn-azul" onclick="inscribirse()">Inscribirse</button>
        </div>
        <p id="msg-inscripcion" style="margin-top:10px; font-size:0.85rem;"></p>
      </div>
      <div id="lista-clases"></div>
    </div>

    <!-- Tareas -->
    <div id="seccion-tareas" style="display:none">
      <h2 style="margin-bottom:20px; color:#1a3c6e;">Tareas Pendientes</h2>
      <div id="lista-tareas"></div>
    </div>

    <!-- Materiales -->
    <div id="seccion-materiales" style="display:none">
      <h2 style="margin-bottom:20px; color:#1a3c6e;">Materiales</h2>
      <div id="lista-materiales"></div>
    </div>

    <!-- Calificaciones -->
    <div id="seccion-calificaciones" style="display:none">
      <h2 style="margin-bottom:20px; color:#1a3c6e;">Mis Calificaciones</h2>
      <div id="lista-calificaciones"></div>
    </div>

  </div>
</div>

<!-- Modal para entregar tarea -->
<div id="modal-entrega" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.5); z-index:100; justify-content:center; align-items:center;">
  <div style="background:white; padding:32px; border-radius:12px; width:90%; max-width:480px;">
    <h3 style="margin-bottom:16px; color:#1a3c6e;">Entregar Tarea</h3>
    <p id="modal-tarea-titulo" style="margin-bottom:16px; font-weight:600;"></p>
    <div class="campo">
      <label>Archivo (PDF, Word, etc.)</label>
      <input type="file" id="archivo-entrega" accept=".pdf,.doc,.docx,.pptx,.xlsx,.zip"/>
    </div>
    <div class="campo">
      <label>Comentario (opcional)</label>
      <textarea id="comentario-entrega" rows="3"
        style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; font-size:0.9rem;"></textarea>
    </div>
    <div style="display:flex; gap:10px; margin-top:16px;">
      <button class="btn btn-azul" onclick="subirEntrega()">Entregar</button>
      <button class="btn" style="background:#eee;" onclick="cerrarModal()">Cancelar</button>
    </div>
    <p id="msg-entrega" style="margin-top:10px; font-size:0.85rem;"></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/estudiante.js"></script>
</body>
</html>
